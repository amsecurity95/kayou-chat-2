<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#3563C9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kayou Chat">
<title>Kayou Chat</title>
<link rel="icon" href="/kayou-logo.png">
<link rel="apple-touch-icon" href="/kayou-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFFFF;--bg2:#F7F8FA;--text:#1A2332;--text2:#64748B;--text3:#94A3B8;--border:#E8EDF2;--border2:#F0F0F2;--card:#FFFFFF;--card2:#F1F5F9;--blue:#3563C9;--blue2:#2A4FAF;--green:#4CAF50;--red:#EF4444;--bubble-other:#E9E9EB;--bubble-self:#007AFF;--sidebar-bg:linear-gradient(180deg,#3563C9 0%,#2A4FAF 100%)}
[data-theme="dark"]{--bg:#1C1C1E;--bg2:#0D0D0F;--text:#FFFFFF;--text2:#8E8E93;--text3:#636366;--border:#2C2C2E;--border2:#1C1C1E;--card:#1C1C1E;--card2:#2C2C2E;--bubble-other:#2C2C2E}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);font-weight:500;letter-spacing:-0.01em}
h1,h2,h3{font-weight:900;letter-spacing:-0.035em}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:10px}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes loadBar{0%{width:0}60%{width:70%}100%{width:100%}}
@keyframes typingBounce{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-4px);opacity:1}}
.msg-enter{animation:fadeUp 180ms cubic-bezier(.22,1,.36,1) forwards}
.slide-in{animation:slideRight 200ms cubic-bezier(.22,1,.36,1) forwards}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
#splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:9999;transition:opacity .3s}
#splash.hide{opacity:0;pointer-events:none}
#splash img{width:80px;height:80px;border-radius:16px;margin-bottom:20px;box-shadow:0 8px 40px rgba(53,99,201,.2)}
#splash h1{font-size:20px;font-weight:900;letter-spacing:-0.04em;margin-bottom:8px}
#splash p{font-size:12px;color:var(--text2);font-weight:600}
#splash .bar{width:128px;height:4px;border-radius:4px;background:var(--border);margin-top:24px;overflow:hidden}
#splash .bar div{height:100%;border-radius:4px;background:linear-gradient(90deg,#3563C9,#2A4FAF);animation:loadBar 1.5s ease-in-out forwards}

/* Sidebar */
#sidebar{width:272px;flex-shrink:0;display:flex;flex-direction:column;background:var(--sidebar-bg);position:relative;overflow:hidden}
#sidebar .bubbles{position:absolute;inset:0;pointer-events:none;z-index:0}
#sidebar .bubbles div{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%)}
#sidebar .b1{width:140px;height:140px;top:60px;left:-40px}
#sidebar .b2{width:90px;height:90px;top:220px;right:-25px}
#sidebar .inner{position:relative;z-index:1;display:flex;flex-direction:column;flex:1;overflow:hidden}

/* Sidebar header */
.sb-header{height:76px;display:flex;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid rgba(255,255,255,.12);flex-shrink:0}
.sb-header img{width:58px;height:58px;flex-shrink:0}
.sb-header h1{font-size:18px;color:#fff;font-weight:900;letter-spacing:-0.04em;flex:1}

/* Nav rail */
.nav-rail{display:flex;align-items:center;gap:4px;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.nav-btn{width:40px;height:36px;border-radius:10px;border:none;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s}
.nav-btn:hover{background:rgba(255,255,255,.12)}
.nav-btn.active{background:rgba(255,255,255,.2);color:#fff}
.nav-badge{position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;background:#FF6B6B;color:#fff;font-size:9px;font-weight:700;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #3563C9}

/* Sidebar scroll area */
.sb-scroll{flex:1;overflow-y:auto;padding:12px 0}
.section-toggle{width:100%;padding:0 20px 4px;display:flex;align-items:center;gap:6px;border:none;background:none;cursor:pointer}
.section-toggle span.arrow{font-size:14px;color:rgba(255,255,255,.4);transition:transform .2s}
.section-toggle span.arrow.collapsed{transform:rotate(-90deg)}
.section-toggle span.label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:rgba(255,255,255,.5)}
.section-toggle span.count{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);margin-left:auto}

/* Channel items */
.ch-item{display:flex;align-items:center;gap:10px;padding:7px 12px;margin:0 8px;border-radius:10px;border:none;background:none;color:rgba(255,255,255,.9);cursor:pointer;width:calc(100% - 16px);text-align:left;font-size:13.5px;font-family:inherit;font-weight:400;transition:all .2s}
.ch-item:hover{background:rgba(255,255,255,.1)}
.ch-item.active{background:rgba(255,255,255,.18);box-shadow:inset 3px 0 0 0 #fff;font-weight:600;color:#fff}
.ch-item .dm-avatar{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;background:rgba(255,255,255,.3);position:relative;flex-shrink:0}
.ch-item .dm-dot{position:absolute;bottom:-1px;right:-1px;width:8px;height:8px;border-radius:50%;background:#4CAF50;border:1.5px solid #3563C9}
.ai-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,.25);color:#fff;text-transform:uppercase;letter-spacing:.03em;margin-left:auto}

/* Sidebar bottom */
.sb-profile{padding:10px 16px;display:flex;align-items:center;gap:12px;border-top:1px solid rgba(255,255,255,.1);flex-shrink:0}
.sb-profile .avatar{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;background:rgba(255,255,255,.3);flex-shrink:0}
.sb-profile .name{font-size:13px;font-weight:600;color:#fff}
.sb-profile .status{font-size:10px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:4px}
.sb-toggles{padding:8px 16px;display:flex;gap:8px;border-top:1px solid rgba(255,255,255,.1);flex-shrink:0}
.toggle-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:12px;border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;transition:all .2s}
.toggle-btn.on{background:rgba(255,255,255,.15)}

/* Main chat area */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.chat-header{height:52px;display:flex;align-items:center;padding:0 20px;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.chat-header .ch-name{font-size:16px;font-weight:900;letter-spacing:-0.01em;text-transform:uppercase}
.chat-header .ch-desc{font-size:13px;font-weight:500;color:var(--text2);margin-left:8px}
.chat-header .actions{margin-left:auto;display:flex;gap:4px}
.chat-header .actions button{width:32px;height:32px;border-radius:8px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s}
.chat-header .actions button:hover{background:var(--card2)}

/* Messages */
.chat-scroll{flex:1;overflow-y:auto;padding:20px}
.chat-msgs{max-width:760px;margin:0 auto}
.date-sep{display:flex;align-items:center;gap:12px;margin:20px 0}
.date-sep .line{flex:1;height:1px;background:var(--border)}
.date-sep .label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 12px;border-radius:20px;background:var(--card2);color:var(--text3)}

.bubble-row{display:flex;gap:8px;margin-bottom:2px;align-items:flex-end}
.bubble-row.self{flex-direction:row-reverse}
.bubble-row.grouped{margin-top:-1px}
.bubble-row.grouped .bubble-avatar{visibility:hidden}
.bubble-row.grouped .bubble-name{display:none}
.bubble-row.grouped .chat-bubble.other{border-top-left-radius:4px}
.bubble-row.grouped .chat-bubble.self-b{border-top-right-radius:4px}
.bubble-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;cursor:pointer;overflow:hidden}
.bubble-avatar img{width:100%;height:100%;object-fit:cover}
.bubble-name{font-size:11px;font-weight:800;margin-bottom:2px;color:#6B7280;text-transform:uppercase;letter-spacing:.06em}
.chat-bubble{padding:9px 14px;border-radius:18px;max-width:70%;position:relative;line-height:1.45;font-size:15px;font-weight:500;word-break:break-word;letter-spacing:-0.01em}
.chat-bubble.other{background:var(--bubble-other);color:var(--text);border-bottom-left-radius:4px}
.chat-bubble.self-b{background:var(--bubble-self);color:#fff;border-bottom-right-radius:4px}
.bubble-time{font-size:11px;margin-top:2px;text-align:right;color:var(--text3)}
.chat-bubble.self-b .bubble-time{color:rgba(255,255,255,.55)}
.bubble-row:not(.grouped) .chat-bubble.other{border-top-left-radius:18px}
.bubble-row:not(.grouped) .chat-bubble.self-b{border-top-right-radius:18px}
.mt-4{margin-top:16px}

/* Typing indicator */
.typing-row{display:flex;gap:8px;align-items:flex-end;margin-top:16px}
.typing-bubble{background:var(--bubble-other);border-radius:18px;border-bottom-left-radius:4px;padding:12px 18px;display:inline-flex;gap:4px;align-items:center}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.typing-dot:nth-child(1){animation:typingBounce 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation:typingBounce 1.2s ease-in-out .2s infinite}
.typing-dot:nth-child(3){animation:typingBounce 1.2s ease-in-out .4s infinite}

/* Input area */
.input-area{padding:12px 20px;flex-shrink:0}
.input-card{border-radius:12px;border:1px solid var(--border);background:var(--card);overflow:hidden}
.input-card textarea{width:100%;border:none;background:transparent;padding:10px 14px;font-size:14px;font-family:inherit;color:var(--text);resize:none;min-height:22px;max-height:140px;line-height:1.5}
.input-card textarea::placeholder{color:var(--text3)}
.input-card textarea:focus{outline:none}
.input-bottom{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-top:1px solid var(--border2)}
.send-btn{width:32px;height:32px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:#fff;background:var(--blue)}
.send-btn:disabled{opacity:.3;cursor:default}
.send-btn:not(:disabled):hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(53,99,201,.3)}

/* Settings overlay */
#settings{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:var(--bg2)}
#settings.open{display:flex}
.settings-top{height:56px;display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.settings-top .back{display:flex;align-items:center;gap:4px;border:none;background:none;cursor:pointer;color:var(--blue);font-family:inherit;font-size:14px;font-weight:700;letter-spacing:-0.02em}
.settings-top h2{flex:1;text-align:center;font-size:17px;font-weight:900;letter-spacing:-0.04em}
.settings-body{display:flex;flex:1;overflow:hidden}
.settings-sidebar{width:220px;flex-shrink:0;padding:12px;overflow-y:auto;background:var(--bg2)}
.settings-sidebar .group-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:var(--text3);padding:0 12px;margin-bottom:8px;margin-top:16px}
.settings-sidebar .group-label:first-child{margin-top:0}
.settings-sidebar button{width:100%;display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:12px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--text2);text-align:left;transition:all .15s}
.settings-sidebar button.active{background:var(--card2);font-weight:800;color:var(--text)}
.settings-sidebar button .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.settings-sidebar button .icon .material-symbols-rounded{font-size:15px;color:#fff}
.settings-content{flex:1;overflow-y:auto;padding:24px;background:var(--bg2)}
.settings-content .section{max-width:800px}

/* Responsive */
@media(max-width:768px){
  #sidebar{display:none}
  #main{width:100%}
}
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <img src="/kayou-logo.png" alt="Kayou" class="animate-pulse">
  <h1>Kayou Chat</h1>
  <p>Your AI team is loading...</p>
  <div class="bar"><div></div></div>
</div>

<!-- App -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="bubbles"><div class="b1"></div><div class="b2"></div></div>
    <div class="inner">
      <div class="sb-header">
        <img src="/kayou-logo.png" alt="Kayou">
        <h1>Kayou Chat</h1>
        <button onclick="openSettings()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.8)">
          <span class="material-symbols-rounded" style="font-size:18px">settings</span>
        </button>
      </div>

      <div class="nav-rail" id="navRail"></div>
      <div class="sb-scroll" id="sbScroll"></div>

      <div class="sb-profile" id="sbProfile"></div>
      <div class="sb-toggles" id="sbToggles"></div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div class="chat-header" id="chatHeader"></div>
    <div class="chat-scroll" id="chatScroll">
      <div class="chat-msgs" id="chatMsgs"></div>
    </div>
    <div class="input-area">
      <div class="input-card" id="inputCard">
        <textarea id="msgInput" rows="1" placeholder="Talk to the team..."></textarea>
        <div class="input-bottom">
          <div></div>
          <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">
            <span class="material-symbols-rounded" style="font-size:18px">arrow_upward</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Settings -->
<div id="settings">
  <div class="settings-top">
    <button class="back" onclick="closeSettings()">
      <span class="material-symbols-rounded" style="font-size:20px">chevron_left</span> Chat
    </button>
    <h2>Settings</h2>
    <div style="width:60px"></div>
  </div>
  <div class="settings-body">
    <div class="settings-sidebar" id="settingsSidebar"></div>
    <div class="settings-content" id="settingsContent"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
const S = {
  channel: 'general',
  messages: { general:[], ideas:[], research:[], build:[], testing:[], release:[],
    'dm-kayou-code':[], 'dm-kayou-kilo':[], 'dm-claude':[], 'dm-dev':[], 'dm-ops':[], 'dm-scout':[], 'dm-analyst':[] },
  typing: null,
  darkMode: false,
  chillMode: false,
  channelsCollapsed: false,
  dmsCollapsed: false,
  agents: [],
  settingsTab: 'agents',
}

const PEOPLE = {
  aimar: { id:'aimar', name:'Aimar', role:'CEO', avatar:'A', gradient:'linear-gradient(135deg,#3563C9,#2A4FAF)', isBot:false, statusEmoji:'verified', statusText:'Running the show' },
  'kayou-code': { id:'kayou-code', name:'Kayou Code', role:'Build Lead', avatar:'KC', gradient:'linear-gradient(135deg,#3563C9,#2A4FAF)', isBot:true, statusEmoji:'build', statusText:'Leading build team' },
  dev: { id:'dev', name:'Dev', role:'Developer', avatar:'DV', gradient:'linear-gradient(135deg,#6366F1,#4F46E5)', isBot:true, statusEmoji:'code', statusText:'Writing code' },
  ops: { id:'ops', name:'Ops', role:'DevOps', avatar:'OP', gradient:'linear-gradient(135deg,#0EA5E9,#0284C7)', isBot:true, statusEmoji:'cloud_upload', statusText:'Managing infra' },
  'kayou-kilo': { id:'kayou-kilo', name:'Kayou Kilo', role:'Research Lead', avatar:'KK', gradient:'linear-gradient(135deg,#8B5CF6,#7C3AED)', isBot:true, statusEmoji:'trending_up', statusText:'Finding opportunities' },
  scout: { id:'scout', name:'Scout', role:'Trend Hunter', avatar:'SC', gradient:'linear-gradient(135deg,#F59E0B,#D97706)', isBot:true, statusEmoji:'explore', statusText:'Hunting trends' },
  analyst: { id:'analyst', name:'Analyst', role:'Numbers', avatar:'AN', gradient:'linear-gradient(135deg,#10B981,#059669)', isBot:true, statusEmoji:'analytics', statusText:'Crunching numbers' },
  claude: { id:'claude', name:'Claude', role:'Security Lead', avatar:'C', gradient:'linear-gradient(135deg,#D97706,#B45309)', isBot:true, statusEmoji:'shield', statusText:'Reviewing security' },
}

const CHANNELS = [
  { id:'general', name:'general', icon:'forum', description:'Team room — all agents active' },
  { id:'ideas', name:'ideas', icon:'lightbulb', description:'Brainstorm & pitch' },
  { id:'research', name:'research', icon:'lab_research', description:'Deep dives' },
  { id:'build', name:'build', icon:'construction', description:'Active development' },
  { id:'testing', name:'testing', icon:'bug_report', description:'QA & testing' },
  { id:'release', name:'release', icon:'rocket_launch', description:'Deploys & launches' },
]

const DM_CHANNELS = [
  { id:'dm-kayou-code', personId:'kayou-code' },
  { id:'dm-kayou-kilo', personId:'kayou-kilo' },
  { id:'dm-claude', personId:'claude' },
  { id:'dm-dev', personId:'dev' },
  { id:'dm-ops', personId:'ops' },
  { id:'dm-scout', personId:'scout' },
  { id:'dm-analyst', personId:'analyst' },
]

const CHANNEL_AGENTS = {
  general:['kayou-code','kayou-kilo'], ideas:['kayou-kilo','scout','analyst'],
  research:['kayou-kilo','scout','analyst'], build:['kayou-code','dev','ops'],
  testing:['kayou-code','dev'], release:['kayou-code','ops'],
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id)
const isDM = () => S.channel.startsWith('dm-')

function formatTs(iso) {
  const d = new Date(iso), diff = (Date.now() - d.getTime()) / 3600000
  if (diff < 1) return `${Math.max(1, Math.round(diff * 60))}m ago`
  if (diff < 24) return d.toLocaleTimeString([], { hour:'numeric', minute:'2-digit' })
  return d.toLocaleDateString([], { month:'short', day:'numeric' })
}

function formatContent(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.*?)\*/g, '<i>$1</i>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--card2);padding:1px 5px;border-radius:4px;font-size:12.5px;color:#2B7DD6">$1</code>')
    .replace(/@(\w[\w\s]*?\w)/g, '<span style="background:rgba(53,99,201,.15);color:#3563C9;padding:1px 6px;border-radius:4px;font-weight:600">@$1</span>')
}

/* ═══════════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════════ */
function renderNavRail() {
  const items = [
    { icon:'home', label:'Home' },
    { icon:'chat_bubble', label:'DMs' },
    { icon:'notifications', label:'Activity' },
  ]
  $('navRail').innerHTML = items.map(it =>
    `<button class="nav-btn" onclick="switchChannel('general')" title="${it.label}">
      <span class="material-symbols-rounded" style="font-size:18px">${it.icon}</span>
    </button>`
  ).join('')
}

function renderSidebar() {
  let html = ''

  // Channels section
  html += `<button class="section-toggle" onclick="S.channelsCollapsed=!S.channelsCollapsed;renderSidebar()">
    <span class="material-symbols-rounded arrow ${S.channelsCollapsed?'collapsed':''}">expand_more</span>
    <span class="label">Channels</span>
    <span class="count">${CHANNELS.length}</span>
  </button>`
  if (!S.channelsCollapsed) {
    CHANNELS.forEach(ch => {
      html += `<button class="ch-item ${S.channel===ch.id?'active':''}" onclick="switchChannel('${ch.id}')">
        <span class="material-symbols-rounded" style="font-size:17px">${ch.icon}</span>
        <span>${ch.name}</span>
      </button>`
    })
  }

  // DMs section
  html += `<button class="section-toggle" style="margin-top:16px" onclick="S.dmsCollapsed=!S.dmsCollapsed;renderSidebar()">
    <span class="material-symbols-rounded arrow ${S.dmsCollapsed?'collapsed':''}">expand_more</span>
    <span class="label">Direct Messages</span>
    <span class="count">${DM_CHANNELS.length}</span>
  </button>`
  if (!S.dmsCollapsed) {
    DM_CHANNELS.forEach(dm => {
      const p = PEOPLE[dm.personId]
      const photo = S.agents.find(a => a.id === dm.personId)?.profilePhoto
      html += `<button class="ch-item ${S.channel===dm.id?'active':''}" onclick="switchChannel('${dm.id}')">
        <div class="dm-avatar" style="${photo ? '' : 'background:'+p.gradient}">
          ${photo ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;border-radius:6px">` : p.avatar}
          <div class="dm-dot"></div>
        </div>
        <span>${p.name}</span>
        ${p.isBot ? '<span class="ai-badge">ai</span>' : ''}
      </button>`
    })
  }

  $('sbScroll').innerHTML = html

  // Profile
  $('sbProfile').innerHTML = `
    <div class="avatar">A</div>
    <div style="flex:1;min-width:0">
      <div class="name">Aimar</div>
      <div class="status"><span class="material-symbols-rounded" style="font-size:12px">verified</span> Running the show</div>
    </div>`

  // Toggles
  $('sbToggles').innerHTML = `
    <button class="toggle-btn ${S.darkMode?'on':''}" onclick="toggleDark()">
      <span class="material-symbols-rounded" style="font-size:14px">${S.darkMode?'dark_mode':'light_mode'}</span>
      ${S.darkMode?'Night':'Day'}
    </button>
    <button class="toggle-btn ${S.chillMode?'on':''}" onclick="S.chillMode=!S.chillMode;renderSidebar()">
      ${S.chillMode?'🌴':'💼'} ${S.chillMode?'Chill':'Work'}
    </button>`
}

function renderHeader() {
  if (isDM()) {
    const p = PEOPLE[S.channel.replace('dm-','')]
    $('chatHeader').innerHTML = `
      <span class="material-symbols-rounded" style="font-size:26px;color:var(--blue)">${p.statusEmoji}</span>
      <span class="ch-name">${p.name}</span>
      <span class="ch-desc">${p.role}</span>`
  } else {
    const ch = CHANNELS.find(c => c.id === S.channel)
    $('chatHeader').innerHTML = `
      <span class="material-symbols-rounded" style="font-size:26px;color:var(--blue)">${ch.icon}</span>
      <span class="ch-name">${ch.name}</span>
      <span class="ch-desc">${ch.description}</span>`
  }
}

function renderMessages() {
  const msgs = S.messages[S.channel] || []
  let html = ''
  let lastDate = ''

  msgs.forEach((msg, idx) => {
    const sender = PEOPLE[msg.senderId]
    if (!sender) return
    const isOwn = msg.senderId === 'aimar'
    const prev = msgs[idx - 1]
    const grouped = prev && prev.senderId === msg.senderId && (new Date(msg.ts).getTime() - new Date(prev.ts).getTime()) < 300000

    // Date separator
    const msgDate = new Date(msg.ts).toDateString()
    if (msgDate !== lastDate) {
      lastDate = msgDate
      const today = new Date().toDateString()
      const yest = new Date(Date.now() - 86400000).toDateString()
      const label = msgDate === today ? 'Today' : msgDate === yest ? 'Yesterday' : new Date(msg.ts).toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' })
      html += `<div class="date-sep"><div class="line"></div><span class="label">${label}</span><div class="line"></div></div>`
    }

    const photo = S.agents.find(a => a.id === msg.senderId)?.profilePhoto

    html += `<div class="msg-enter ${grouped ? 'bubble-row grouped' : 'bubble-row mt-4'} ${isOwn ? 'self' : ''}">
      <div class="bubble-avatar" style="background:${sender.gradient}">
        ${photo ? `<img src="${photo}">` : sender.avatar}
      </div>
      <div>
        ${!grouped && !isOwn ? `<div class="bubble-name">${sender.name} ${sender.isBot ? '<span style="font-size:8px;padding:1px 4px;border-radius:4px;background:var(--card2);color:var(--text3);margin-left:4px">AI</span>' : ''}</div>` : ''}
        <div class="chat-bubble ${isOwn ? 'self-b' : 'other'}">
          <div>${formatContent(msg.content)}</div>
          <div class="bubble-time">${formatTs(msg.ts)}</div>
        </div>
      </div>
    </div>`
  })

  // Typing indicator
  if (S.typing && PEOPLE[S.typing]) {
    const t = PEOPLE[S.typing]
    html += `<div class="typing-row msg-enter">
      <div class="bubble-avatar" style="background:${t.gradient}">${t.avatar}</div>
      <div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
    </div>`
  }

  $('chatMsgs').innerHTML = html
  $('chatScroll').scrollTop = $('chatScroll').scrollHeight
}

function renderSettings() {
  const tabs = [
    { group:'General', items:[
      { id:'agents', icon:'smart_toy', label:'AI Agents', color:'#3563C9' },
      { id:'rules', icon:'gavel', label:'Rules', color:'#F59E0B' },
    ]},
    { group:'Workspace', items:[
      { id:'projects', icon:'dashboard', label:'Projects', color:'#8B5CF6' },
      { id:'services', icon:'dns', label:'Services', color:'#06B6D4' },
    ]},
    { group:'Integrations', items:[
      { id:'github', icon:'code', label:'GitHub', color:'#1A2332' },
      { id:'webhook', icon:'webhook', label:'Webhooks', color:'#EF4444' },
    ]},
  ]

  let sidebar = ''
  tabs.forEach(g => {
    sidebar += `<div class="group-label">${g.group}</div>`
    g.items.forEach(it => {
      sidebar += `<button class="${S.settingsTab===it.id?'active':''}" onclick="S.settingsTab='${it.id}';renderSettings()">
        <div class="icon" style="background:${it.color}"><span class="material-symbols-rounded">${it.icon}</span></div>
        ${it.label}
      </button>`
    })
  })
  $('settingsSidebar').innerHTML = sidebar

  // Content
  let content = '<div class="section">'
  if (S.settingsTab === 'agents') {
    content += `<h3 style="margin-bottom:16px">AI Agents</h3>`
    S.agents.forEach(a => {
      content += `<div style="padding:16px;border-radius:16px;background:var(--card);border:1px solid var(--border);margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:40px;height:40px;border-radius:12px;background:${a.color || '#3563C9'};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;overflow:hidden;flex-shrink:0">
            ${a.profilePhoto ? `<img src="${a.profilePhoto}" style="width:100%;height:100%;object-fit:cover">` : (a.name||'?').charAt(0)}
          </div>
          <div style="flex:1">
            <div style="font-weight:800;font-size:14px">${a.name}</div>
            <div style="font-size:11px;color:var(--text2)">${a.provider} · ${a.model || 'webhook'} · ${a.enabled?'<span style="color:#10B981">Active</span>':'<span style="color:var(--text3)">Disabled</span>'}</div>
          </div>
        </div>
      </div>`
    })
  } else {
    content += `<h3 style="margin-bottom:8px">${S.settingsTab}</h3><p style="color:var(--text2);font-size:13px">Coming soon.</p>`
  }
  content += '</div>'
  $('settingsContent').innerHTML = content
}

/* ═══════════════════════════════════════════════════════════
   ACTIONS
   ═══════════════════════════════════════════════════════════ */
function switchChannel(id) {
  S.channel = id
  renderSidebar()
  renderHeader()
  renderMessages()
  updatePlaceholder()
}

function updatePlaceholder() {
  const inp = $('msgInput')
  if (isDM()) {
    inp.placeholder = `Message ${PEOPLE[S.channel.replace('dm-','')]?.name || ''}`
  } else {
    const ch = CHANNELS.find(c => c.id === S.channel)
    inp.placeholder = S.channel === 'general' ? 'Talk to the team — all agents are here...' : `Message #${ch?.name || ''}`
  }
}

function toggleDark() {
  S.darkMode = !S.darkMode
  document.documentElement.setAttribute('data-theme', S.darkMode ? 'dark' : '')
  renderSidebar()
}

function openSettings() {
  $('settings').classList.add('open')
  renderSettings()
}
function closeSettings() {
  $('settings').classList.remove('open')
}

async function sendMessage() {
  const inp = $('msgInput')
  const text = inp.value.trim()
  if (!text) return
  inp.value = ''
  $('sendBtn').disabled = true

  // Add user message
  const msg = { id: Date.now().toString(), channelId: S.channel, senderId:'aimar', content: text, ts: new Date().toISOString() }
  if (!S.messages[S.channel]) S.messages[S.channel] = []
  S.messages[S.channel].push(msg)
  renderMessages()

  // Determine responders
  let responders
  if (isDM()) {
    responders = [S.channel.replace('dm-','')]
  } else {
    const channelAgents = CHANNEL_AGENTS[S.channel] || ['kayou-code','kayou-kilo']
    const lead = channelAgents[0]
    const members = channelAgents.slice(1)
    const picked = members.filter(() => Math.random() > 0.4).slice(0, 2)
    if (picked.length === 0 && members.length > 0) picked.push(members[Math.floor(Math.random() * members.length)])
    responders = [...picked, lead]

    // Add mentioned agents
    if (text.toLowerCase().includes('@claude') && !responders.includes('claude')) responders.splice(responders.length - 1, 0, 'claude')
  }

  // Get AI responses
  responders.forEach((rid, i) => {
    setTimeout(() => { S.typing = rid; renderMessages() }, 500 + i * 900)
    setTimeout(async () => {
      try {
        const history = (S.messages[S.channel] || []).slice(-12).map(m => ({
          role: m.senderId === 'aimar' ? 'user' : 'assistant',
          content: m.senderId === 'aimar' ? m.content : (m.senderId === rid ? m.content : `[${PEOPLE[m.senderId]?.name || m.senderId}]: ${m.content}`),
        }))
        const res = await fetch('/api/chat', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ agentId: rid, message: text, history, channelId: S.channel }),
        })
        const data = await res.json()
        S.typing = null
        const reply = { id: (Date.now() + i + 1).toString(), channelId: S.channel, senderId: rid, content: data.response || data.error || 'No response', ts: new Date().toISOString() }
        S.messages[S.channel].push(reply)
        renderMessages()
      } catch (err) {
        S.typing = null
        const reply = { id: (Date.now() + i + 1).toString(), channelId: S.channel, senderId: rid, content: 'Sorry, I couldn\'t connect. Try again.', ts: new Date().toISOString() }
        S.messages[S.channel].push(reply)
        renderMessages()
      }
    }, 600 + i * 400)
  })
}

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
async function loadAgents() {
  try {
    const res = await fetch('/api/config/agents')
    S.agents = await res.json()
  } catch(e) { console.error('Failed to load agents:', e) }
}

async function init() {
  await loadAgents()
  renderNavRail()
  renderSidebar()
  renderHeader()
  renderMessages()
  updatePlaceholder()

  // Input handling
  const inp = $('msgInput')
  inp.addEventListener('input', () => {
    $('sendBtn').disabled = !inp.value.trim()
    inp.style.height = 'auto'
    inp.style.height = Math.min(inp.scrollHeight, 140) + 'px'
  })
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
  })

  // Hide splash
  setTimeout(() => {
    $('splash').classList.add('hide')
    setTimeout(() => $('splash').remove(), 300)
  }, 1500)
}

init()
</script>
</body>
</html>
