<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<title>Kayou — AI Agent Platform</title>
<link rel="icon" href="/kayou-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#FFFFFF;color:#1A1A2E;font-size:14px;overflow:hidden}
.material-symbols-rounded{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}

/* ═══ SHELL ═══ */
#shell{width:100%;height:100vh;background:#FFFFFF;display:flex;flex-direction:column;overflow:hidden}

/* ═══ TOP BAR ═══ */
.topbar{height:60px;display:flex;align-items:center;padding:0 24px;gap:20px;border-bottom:1px solid #F0F0F5;flex-shrink:0;background:#FFFFFF}
.topbar .logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar .logo img{width:32px;height:32px}
.topbar .logo span{font-size:16px;font-weight:800;letter-spacing:-.02em;color:#1A1A2E}
.topbar .search{flex:1;max-width:440px;margin:0 auto;position:relative}
.topbar .search input{width:100%;height:38px;border-radius:10px;border:1px solid #E8E8EF;background:#F8F8FB;padding:0 14px 0 38px;font-size:13px;color:#1A1A2E;font-family:inherit;transition:all .15s}
.topbar .search input::placeholder{color:#B0B0C0}
.topbar .search input:focus{outline:none;border-color:#7B8CDE;background:#fff;box-shadow:0 0 0 3px rgba(123,140,222,.12)}
.topbar .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:18px;color:#B0B0C0}
.topbar .top-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.topbar .top-actions button{width:38px;height:38px;border-radius:10px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#8B8BA0;transition:all .12s}
.topbar .top-actions button:hover{background:#F5F5FA;color:#1A1A2E}
.topbar .top-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;cursor:pointer;flex-shrink:0;background:linear-gradient(135deg,#6366F1,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}

/* ═══ BODY ═══ */
.body{display:flex;flex:1;overflow:hidden}

/* ═══ SIDEBAR ═══ */
.sidebar{width:200px;flex-shrink:0;padding:20px 12px;display:flex;flex-direction:column;border-right:1px solid #F0F0F5;background:#FFFFFF}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:#6B6B80;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-family:inherit;margin-bottom:2px}
.nav-item:hover{background:#F5F5FA;color:#1A1A2E}
.nav-item.active{background:#EEF2FF;color:#6366F1;font-weight:600}
.nav-item .material-symbols-rounded{font-size:20px}
.nav-item.active .material-symbols-rounded{color:#6366F1}

.sidebar-user{margin-top:auto;padding:12px 8px;display:flex;align-items:center;gap:10px;border-top:1px solid #F0F0F5}
.sidebar-user .av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;position:relative;flex-shrink:0;overflow:hidden}
.sidebar-user .av img{width:100%;height:100%;object-fit:cover}
.sidebar-user .av .dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:#10B981;border:2px solid #FFFFFF}
.sidebar-user .uname{font-size:13px;font-weight:600;color:#1A1A2E}

/* ═══ MAIN ═══ */
.main-area{flex:1;overflow-y:auto;padding:28px 32px;display:flex;gap:24px}
.main-left{flex:1;min-width:0}
.main-right{width:300px;flex-shrink:0}

/* Header */
.home-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.home-head h1{font-size:26px;font-weight:700;letter-spacing:-.03em;color:#1A1A2E;margin-bottom:2px}
.home-head p{font-size:14px;color:#8B8BA0;font-weight:400}
.home-head .acts{display:flex;gap:8px}
.home-head .acts button{width:32px;height:32px;border-radius:8px;border:1px solid #E8E8EF;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#8B8BA0;transition:all .1s}
.home-head .acts button:hover{border-color:#B0B0C0;color:#1A1A2E}

/* ═══ INTEGRATION CARDS ═══ */
.int-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.int-card{background:#fff;border:1px solid #EAEAF0;border-radius:14px;padding:20px;transition:all .15s}
.int-card:hover{border-color:#D0D0E0;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.int-card .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.int-card .card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.int-card .card-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:8px;background:#D1FAE5;color:#065F46}
.int-card h3{font-size:16px;font-weight:700;color:#1A1A2E;margin-bottom:6px;letter-spacing:-.01em}
.int-card .card-desc{font-size:12px;color:#8B8BA0;margin-bottom:16px;line-height:1.5}
.int-card .card-stats{display:flex;flex-direction:column;gap:10px}
.int-card .card-stat{display:flex;align-items:center;gap:6px}
.int-card .card-stat .dot{width:7px;height:7px;border-radius:50%;background:#10B981;flex-shrink:0}
.int-card .card-stat .stat-label{font-size:12px;color:#8B8BA0;flex:1}
.int-card .card-stat-val{font-size:22px;font-weight:800;color:#1A1A2E;letter-spacing:-.02em}
.int-card .card-stat-change{font-size:12px;color:#B0B0C0;margin-left:4px}

/* ═══ METRIC CARDS ═══ */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.metric-card{background:#fff;border:1px solid #EAEAF0;border-radius:14px;padding:24px 24px;position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:0 4px 4px 0}
.metric-card.green::before{background:#10B981}
.metric-card.blue::before{background:#6366F1}
.metric-card.pink::before{background:#EC4899}
.metric-card.purple::before{background:#8B5CF6}
.metric-card .m-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.metric-card .m-top h4{font-size:15px;font-weight:500;color:#6B6B80}
.metric-card .m-top .material-symbols-rounded{font-size:22px;color:#B0B0C0}
.metric-card .m-val{font-size:32px;font-weight:800;letter-spacing:-.03em;color:#1A1A2E}
.metric-card .m-ring{position:absolute;right:18px;bottom:22px;width:60px;height:60px}
.metric-card .m-bottom{display:flex;align-items:center;gap:6px;margin-top:8px}
.metric-card .m-pct{font-size:13px;font-weight:600}
.metric-card .m-pct.up{color:#10B981}
.metric-card .m-pct.down{color:#EF4444}
.metric-card .m-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #D0D0E0;display:flex;align-items:center;justify-content:center;margin-left:auto;color:#B0B0C0}

/* ═══ ACTIVITY PANEL ═══ */
.activity{background:#1A1A2E;border-radius:14px;padding:20px;color:#fff;position:sticky;top:0}
.activity h3{font-size:15px;font-weight:700;margin-bottom:16px;color:#fff}
.act-item{display:flex;gap:10px;padding:12px 0;border-top:1px solid rgba(255,255,255,.08)}
.act-item:first-of-type{border:none;padding-top:0}
.act-item .act-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.act-item .act-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.act-item .act-av .material-symbols-rounded{font-size:16px;color:rgba(255,255,255,.7)}
.act-item .act-body{flex:1;min-width:0}
.act-item .act-title{font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px}
.act-item .act-title .time-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.6)}
.act-item .act-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px;display:flex;align-items:center;gap:4px}

/* ═══ CHAT VIEW ═══ */
.chat-layout{display:flex;height:100%;margin:-28px -32px;width:calc(100% + 64px)}
.chat-channels{width:240px;flex-shrink:0;border-right:1px solid #F0F0F5;padding:20px 12px;overflow-y:auto}
.chat-channels h4{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#B0B0C0;margin-bottom:8px;padding:0 10px}
.chat-ch{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#6B6B80;font-weight:500;transition:all .1s;margin-bottom:1px}
.chat-ch:hover{background:#F5F5FA;color:#1A1A2E}
.chat-ch.active{background:#E8F4F8;color:#0D9488;font-weight:600}
.chat-main{flex:1;display:flex;flex-direction:column}
.chat-hdr{height:52px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid #F0F0F5;font-weight:600;font-size:15px;gap:8px;color:#1A1A2E;flex-shrink:0}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 24px}
.chat-empty{text-align:center;padding:80px 0;color:#B0B0C0}
.chat-empty .material-symbols-rounded{font-size:48px;display:block;margin-bottom:8px;opacity:.3}
.msg-row{display:flex;gap:10px;margin-bottom:16px}
.msg-row.own{flex-direction:row-reverse}
.msg-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:11px;overflow:hidden}
.msg-av img{width:100%;height:100%;object-fit:cover}
.msg-body{max-width:65%}
.msg-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.msg-meta .name{font-size:12px;font-weight:600;color:#6B6B80}
.msg-meta .time{font-size:11px;color:#B0B0C0}
.msg-bubble{padding:10px 16px;border-radius:14px;font-size:14px;line-height:1.55;border-bottom-left-radius:4px}
.msg-row.own .msg-bubble{background:#6366F1;color:#fff;border-radius:14px;border-bottom-right-radius:4px}
.msg-row:not(.own) .msg-bubble{background:#F5F5FA;color:#1A1A2E;border:1px solid #EAEAF0}
.msg-bubble b{font-weight:600}
.msg-bubble code{background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px;font-size:12px;font-family:'SF Mono',monospace}
.chat-input{padding:12px 24px;border-top:1px solid #F0F0F5;flex-shrink:0}
.chat-input textarea{width:100%;border:1px solid #E8E8EF;border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;resize:none;min-height:40px;max-height:120px;background:#F8F8FB;color:#1A1A2E;transition:all .15s}
.chat-input textarea:focus{outline:none;border-color:#7B8CDE;background:#fff;box-shadow:0 0 0 3px rgba(123,140,222,.1)}
.chat-input textarea::placeholder{color:#B0B0C0}

/* Typing */
@keyframes bounce{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-3px);opacity:1}}
.typing-dots{display:inline-flex;gap:3px;padding:10px 16px;background:#F5F5FA;border:1px solid #EAEAF0;border-radius:14px;border-bottom-left-radius:4px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:#B0B0C0}
.typing-dots span:nth-child(1){animation:bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation:bounce 1.2s .2s infinite}
.typing-dots span:nth-child(3){animation:bounce 1.2s .4s infinite}

/* ═══ SETTINGS ═══ */
.settings-wrap{max-width:800px}
.settings-wrap h2{font-size:22px;font-weight:700;margin-bottom:4px}
.settings-wrap .sub{color:#8B8BA0;margin-bottom:24px}
.settings-wrap h4{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#B0B0C0;margin-bottom:10px}
.agent-card{display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px solid #EAEAF0;border-radius:12px;background:#fff;margin-bottom:8px;transition:all .1s}
.agent-card:hover{border-color:#D0D0E0}
.agent-card .a-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px;flex-shrink:0;overflow:hidden}
.agent-card .a-av img{width:100%;height:100%;object-fit:cover}
.agent-card .a-info{flex:1}
.agent-card .a-name{font-weight:600;font-size:14px;color:#1A1A2E}
.agent-card .a-meta{font-size:12px;color:#8B8BA0}
.agent-card .a-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px}
.agent-card .a-badge.on{background:#D1FAE5;color:#065F46}
.agent-card .a-badge.off{background:#F3F4F6;color:#8B8BA0}

/* ═══ SPLASH ═══ */
#splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;z-index:9999;transition:opacity .4s}
#splash.hide{opacity:0;pointer-events:none}
#splash img{width:48px;height:48px;border-radius:12px;margin-bottom:16px}
#splash h1{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
#splash p{font-size:13px;color:#B0B0C0}
#splash .bar{width:120px;height:3px;border-radius:2px;background:#EAEAF0;margin-top:20px;overflow:hidden}
#splash .bar div{height:100%;border-radius:2px;background:#6366F1;animation:loadBar 1.4s ease-in-out forwards}
@keyframes loadBar{0%{width:0}60%{width:70%}100%{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:1100px){.int-grid{grid-template-columns:repeat(2,1fr)}.metric-grid{grid-template-columns:repeat(2,1fr)}.main-right{width:260px}}
@media(max-width:900px){.main-right{display:none}}
@media(max-width:768px){.sidebar{display:none}.main-area{padding:16px}.int-grid{grid-template-columns:1fr 1fr}.metric-grid{grid-template-columns:1fr 1fr}.chat-channels{display:none}.chat-layout{margin:0;width:100%}}
@media(max-width:480px){.int-grid{grid-template-columns:1fr}.metric-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="splash">
  <img src="/kayou-logo.png" alt="Kayou">
  <h1>Kayou</h1>
  <p>Loading your workspace...</p>
  <div class="bar"><div></div></div>
</div>

<div id="shell">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo"><img src="/kayou-logo.png" alt="K"><span>KAYOU</span></div>
    <div class="search">
      <span class="material-symbols-rounded search-icon">search</span>
      <input type="text" placeholder="Search for tasks">
    </div>
    <div class="top-actions">
      <button onclick="setView('home')"><span class="material-symbols-rounded" style="font-size:20px">notifications</span></button>
      <button onclick="setView('chat')"><span class="material-symbols-rounded" style="font-size:20px">chat_bubble</span></button>
      <button><span class="material-symbols-rounded" style="font-size:20px">lan</span></button>
      <button onclick="setView('settings')"><span class="material-symbols-rounded" style="font-size:20px">chat</span></button>
    </div>
    <div class="top-avatar" id="topAv">A</div>
  </div>

  <div class="body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div id="sideNav"></div>
      <div class="sidebar-user" id="sideUser"></div>
    </div>
    <!-- Main -->
    <div class="main-area" id="mainArea"></div>
  </div>
</div>

<script>
const S = { view:'home', agents:[], channel:'general', messages:{} , typing:null }

const PEOPLE = {
  aimar:{name:'Aimar',avatar:'A',gradient:'linear-gradient(135deg,#6366F1,#8B5CF6)',role:'CEO'},
  'kayou-code':{name:'Kayou Code',avatar:'KC',gradient:'linear-gradient(135deg,#6366F1,#4F46E5)',role:'Build Lead',isBot:true},
  dev:{name:'Dev',avatar:'DV',gradient:'linear-gradient(135deg,#3B82F6,#2563EB)',role:'Developer',isBot:true},
  ops:{name:'Ops',avatar:'OP',gradient:'linear-gradient(135deg,#06B6D4,#0891B2)',role:'DevOps',isBot:true},
  'kayou-kilo':{name:'Kayou Kilo',avatar:'KK',gradient:'linear-gradient(135deg,#8B5CF6,#7C3AED)',role:'Research Lead',isBot:true},
  scout:{name:'Scout',avatar:'SC',gradient:'linear-gradient(135deg,#F59E0B,#D97706)',role:'Trend Hunter',isBot:true},
  analyst:{name:'Analyst',avatar:'AN',gradient:'linear-gradient(135deg,#10B981,#059669)',role:'Numbers',isBot:true},
  claude:{name:'Claude',avatar:'C',gradient:'linear-gradient(135deg,#F97316,#EA580C)',role:'Security Lead',isBot:true},
}
const CHANNELS = [{id:'general',name:'general',icon:'forum'},{id:'ideas',name:'ideas',icon:'lightbulb'},{id:'research',name:'research',icon:'lab_research'},{id:'build',name:'build',icon:'construction'},{id:'testing',name:'testing',icon:'bug_report'},{id:'release',name:'release',icon:'rocket_launch'}]
const DM_IDS = ['kayou-code','kayou-kilo','claude','dev','ops','scout','analyst']
const CHANNEL_AGENTS = {general:['kayou-code','kayou-kilo'],ideas:['kayou-kilo','scout','analyst'],research:['kayou-kilo','scout','analyst'],build:['kayou-code','dev','ops'],testing:['kayou-code','dev'],release:['kayou-code','ops']}

CHANNELS.forEach(c=>S.messages[c.id]=[]);DM_IDS.forEach(id=>S.messages['dm-'+id]=[])

const $ = id => document.getElementById(id)
function formatTs(iso){const d=new Date(iso),m=(Date.now()-d.getTime())/60000;if(m<1)return'now';if(m<60)return Math.round(m)+'m';if(m<1440)return Math.round(m/60)+'h';return d.toLocaleDateString([],{month:'short',day:'numeric'})}
function fmt(t){return t.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/@(\w[\w\s]*?\w)/g,'<span style="color:#6366F1;font-weight:600">@$1</span>')}

const NAV = [{id:'home',icon:'home',label:'Home'},{id:'dashboard',icon:'grid_view',label:'Dashboard'},{id:'tasks',icon:'task_alt',label:'Tasks'},{id:'chat',icon:'chat_bubble',label:'Chat'},{id:'analytics',icon:'bar_chart',label:'Analytics'},{id:'settings',icon:'settings',label:'Settings'}]

function setView(v){S.view=v;render()}

function render(){
  $('sideNav').innerHTML=NAV.map(n=>`<button class="nav-item ${S.view===n.id?'active':''}" onclick="setView('${n.id}')"><span class="material-symbols-rounded">${n.icon}</span>${n.label}</button>`).join('')
  $('sideUser').innerHTML=`<div class="av">A<div class="dot"></div></div><div class="uname">Aimar</div>`
  const m=$('mainArea');if(S.view==='home')renderHome(m);else if(S.view==='chat')renderChat(m);else if(S.view==='settings')renderSettings(m);else m.innerHTML=`<div class="main-left"><h1 style="font-size:24px;font-weight:700;margin-bottom:4px">${NAV.find(n=>n.id===S.view)?.label||S.view}</h1><p style="color:#8B8BA0">Coming soon</p></div>`
}

function renderHome(el){
  const cards=[
    {name:'GitHub',desc:'Integration with repository management and CI/CD.',icon:'code',color:'#1F2937',bg:'#F0F4F8',stats:[{l:'Commands',v:'135',c:'48'},{l:'Tasks',v:'5,720',c:'5,720'}]},
    {name:'MCP',desc:'API agent integrations with model context protocol.',icon:'hub',color:'#7C3AED',bg:'#F3EEFF',stats:[{l:'Commands',v:'287',c:'43'},{l:'Tasks',v:'116',c:'3,910'}]},
    {name:'Webhook',desc:'API agent integrations with external webhooks.',icon:'webhook',color:'#0891B2',bg:'#E8F8F5',stats:[{l:'Commands',v:'195',c:'67'},{l:'Tasks',v:'4,261',c:'4,261'}]},
    {name:'API',desc:'All agent integrations with direct API connections.',icon:'api',color:'#6366F1',bg:'#EEF0FF',stats:[{l:'Commands',v:'223',c:'94'},{l:'Connections',v:'6,102',c:'6,102'}]},
  ]
  const metrics=[
    {l:'Orders',v:'920',pct:75,cls:'green',color:'#10B981',icon:'shopping_bag'},
    {l:'Visits',v:'995',pct:58,cls:'blue',color:'#6366F1',icon:'visibility'},
    {l:'Profit',v:'1,025',pct:84,cls:'pink',color:'#EC4899',icon:'trending_up'},
    {l:'Sales',v:'878',pct:52,cls:'purple',color:'#8B5CF6',icon:'point_of_sale'},
  ]
  const acts=[
    {t:'Webhook triggered',tm:'15m',sub:'16 minutes ago',icon:'webhook'},
    {t:'MCP task completed',tm:'26m',sub:'36 minutes ago',icon:'hub'},
    {t:'GitHub command executed',tm:'35m',sub:'35 minutes ago',icon:'code'},
    {t:'New API connection added',tm:'42m',sub:'32 minutes ago',icon:'api'},
    {t:'MCP command executed',tm:'1h',sub:'1 hour ago',icon:'hub'},
    {t:'GitHub command executed',tm:'1h',sub:'35 minutes ago',icon:'code'},
    {t:'MCP command executed',tm:'1h',sub:'1 hour ago',icon:'hub'},
  ]
  el.innerHTML=`
  <div class="main-left">
    <div class="home-head"><div><h1>Hello Aimar</h1><p>here's your workspace overview</p></div><div class="acts"><button><span class="material-symbols-rounded" style="font-size:18px">notifications</span></button><button><span class="material-symbols-rounded" style="font-size:18px">filter_list</span></button><button><span class="material-symbols-rounded" style="font-size:18px">more_horiz</span></button></div></div>
    <div class="int-grid">${cards.map(c=>`<div class="int-card"><div class="card-top"><div class="card-icon" style="background:${c.bg}"><span class="material-symbols-rounded" style="font-size:24px;color:${c.color}">${c.icon}</span></div><span class="card-badge">Active</span></div><h3>${c.name}</h3><p class="card-desc">${c.desc}</p><div class="card-stats">${c.stats.map(s=>`<div class="card-stat"><span class="dot"></span><span class="stat-label">${s.l}</span></div><div style="display:flex;align-items:baseline;gap:4px"><span class="card-stat-val">${s.v}</span><span class="card-stat-change">▸ ${s.c}</span></div>`).join('')}</div></div>`).join('')}</div>
    <div class="metric-grid">${metrics.map(m=>`<div class="metric-card ${m.cls}"><div class="m-top"><h4>${m.l}</h4><span class="material-symbols-rounded">${m.icon}</span></div><div class="m-val">${m.v}</div><svg class="m-ring" viewBox="0 0 36 36"><path d="M18 2.0845a15.9155 15.9155 0 0 1 0 31.831a15.9155 15.9155 0 0 1 0-31.831" fill="none" stroke="#EAEAF0" stroke-width="3"/><path d="M18 2.0845a15.9155 15.9155 0 0 1 0 31.831a15.9155 15.9155 0 0 1 0-31.831" fill="none" stroke="${m.color}" stroke-width="3" stroke-dasharray="${m.pct},100" stroke-linecap="round"/><text x="18" y="21" text-anchor="middle" style="font-size:8px;font-weight:700;fill:#1A1A2E">${m.pct}%</text></svg><div class="m-bottom"><span class="m-pct up">▲ ${m.pct}%</span><div class="m-check"><span class="material-symbols-rounded" style="font-size:12px">check</span></div></div></div>`).join('')}</div>
  </div>
  <div class="main-right">
    <div class="activity"><h3>Activity</h3>${acts.map(a=>`<div class="act-item"><div class="act-av"><span class="material-symbols-rounded">${a.icon}</span></div><div class="act-body"><div class="act-title">${a.t}<span class="time-badge">${a.tm}</span></div><div class="act-sub"><span class="material-symbols-rounded" style="font-size:12px">schedule</span>${a.sub}</div></div></div>`).join('')}</div>
  </div>`
}

function renderChat(el){
  const isDM=S.channel.startsWith('dm-'),msgs=S.messages[S.channel]||[],p=isDM?PEOPLE[S.channel.replace('dm-','')]:null,ch=CHANNELS.find(c=>c.id===S.channel)
  el.innerHTML=`<div class="chat-layout"><div class="chat-channels"><h4>Channels</h4>${CHANNELS.map(c=>`<div class="chat-ch ${S.channel===c.id?'active':''}" onclick="S.channel='${c.id}';render()"><span class="material-symbols-rounded" style="font-size:18px">${c.icon}</span>${c.name}</div>`).join('')}<h4 style="margin-top:20px">Direct Messages</h4>${DM_IDS.map(id=>{const pp=PEOPLE[id],ph=S.agents.find(a=>a.id===id)?.profilePhoto;return`<div class="chat-ch ${S.channel==='dm-'+id?'active':''}" onclick="S.channel='dm-${id}';render()"><div style="width:20px;height:20px;border-radius:50%;background:${pp.gradient};display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px;font-weight:600;overflow:hidden;flex-shrink:0">${ph?`<img src="${ph}" style="width:100%;height:100%;object-fit:cover">`:''}</div>${pp.name}</div>`}).join('')}</div><div class="chat-main"><div class="chat-hdr"><span class="material-symbols-rounded" style="font-size:20px;color:#6366F1">${isDM?'person':ch?.icon||'forum'}</span>${isDM?p?.name:'# '+(ch?.name||'')}</div><div class="chat-msgs" id="chatMsgs">${msgs.length===0?'<div class="chat-empty"><span class="material-symbols-rounded">chat</span><p>No messages yet. Say something!</p></div>':msgs.map(m=>{const pp=PEOPLE[m.senderId],own=m.senderId==='aimar',ph=S.agents.find(a=>a.id===m.senderId)?.profilePhoto;return`<div class="msg-row ${own?'own':''}" style="animation:fadeUp 150ms ease-out"><div class="msg-av" style="background:${pp?.gradient||'#ccc'}">${ph?`<img src="${ph}">`:pp?.avatar||'?'}</div><div class="msg-body">${!own?`<div class="msg-meta"><span class="name">${pp?.name}</span><span class="time">${formatTs(m.ts)}</span></div>`:''}
<div class="msg-bubble">${fmt(m.content)}${own?`<div style="font-size:11px;text-align:right;margin-top:2px;opacity:.5">${formatTs(m.ts)}</div>`:''}</div></div></div>`}).join('')}${S.typing&&PEOPLE[S.typing]?`<div class="msg-row" style="animation:fadeUp 150ms ease-out"><div class="msg-av" style="background:${PEOPLE[S.typing].gradient}">${PEOPLE[S.typing].avatar}</div><div class="typing-dots"><span></span><span></span><span></span></div></div>`:''}</div><div class="chat-input"><textarea id="chatInput" rows="1" placeholder="${isDM?'Message '+p?.name:'Message #'+(ch?.name||'')}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea></div></div></div>`
  const ma=document.getElementById('chatMsgs');if(ma)ma.scrollTop=ma.scrollHeight
}

function renderSettings(el){
  el.innerHTML=`<div class="main-left"><div class="settings-wrap"><h2>Settings</h2><p class="sub">Manage your AI agents and platform integrations</p><h4>AI Agents</h4>${S.agents.map(a=>`<div class="agent-card"><div class="a-av" style="background:${a.color||'#6366F1'}">${a.profilePhoto?`<img src="${a.profilePhoto}">`:(a.name||'?').charAt(0)}</div><div class="a-info"><div class="a-name">${a.name}</div><div class="a-meta">${a.provider} · ${a.model||'webhook'}</div></div><span class="a-badge ${a.enabled?'on':'off'}">${a.enabled?'Active':'Off'}</span></div>`).join('')}</div></div>`
}

async function sendMsg(){
  const inp=document.getElementById('chatInput'),text=inp.value.trim();if(!text)return;inp.value=''
  S.messages[S.channel].push({id:Date.now()+'',channelId:S.channel,senderId:'aimar',content:text,ts:new Date().toISOString()});render()
  const isDM=S.channel.startsWith('dm-')
  let resp;if(isDM){resp=[S.channel.replace('dm-','')]}else{const ca=CHANNEL_AGENTS[S.channel]||['kayou-code','kayou-kilo'],lead=ca[0],mem=ca.slice(1),picked=mem.filter(()=>Math.random()>.5).slice(0,2);if(!picked.length&&mem.length)picked.push(mem[0]);resp=[...picked,lead]}
  for(let i=0;i<resp.length;i++){const rid=resp[i];S.typing=rid;render()
    try{const hist=S.messages[S.channel].slice(-12).map(m=>({role:m.senderId==='aimar'?'user':'assistant',content:m.senderId==='aimar'?m.content:(m.senderId===rid?m.content:`[${PEOPLE[m.senderId]?.name}]: ${m.content}`)}));const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agentId:rid,message:text,history:hist,channelId:S.channel})});const d=await r.json();S.typing=null;S.messages[S.channel].push({id:(Date.now()+i+1)+'',channelId:S.channel,senderId:rid,content:d.response||d.error||'No response',ts:new Date().toISOString()})}catch(e){S.typing=null;S.messages[S.channel].push({id:(Date.now()+i+1)+'',channelId:S.channel,senderId:rid,content:'Connection error.',ts:new Date().toISOString()})}
    render()}
}

async function init(){
  try{const r=await fetch('/api/config/agents');S.agents=await r.json()}catch(e){}
  render();setTimeout(()=>{document.getElementById('splash').classList.add('hide');setTimeout(()=>document.getElementById('splash')?.remove(),400)},1200)
}
init()
</script>
